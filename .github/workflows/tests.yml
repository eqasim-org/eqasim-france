name: Unit and integration tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ "ubuntu-latest", "windows-latest", "macos-latest" ]

    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        distribution: zulu
        java-version: 25
    - name: Install uv
      uses: astral-sh/setup-uv@v7
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version-file: ".python-version"
    - name: Prepare git for Windows
      if: matrix.os == 'windows-latest'
      shell: bash -el {0}
      run: |
        git config --global user.email "you@example.com"
        git config --global user.name "Your Name"
        git config --system core.longpaths true
    - name: Prepare Java for MacOS
      if: matrix.os == 'macos-latest'
      run: |
        export PATH=${JAVA_HOME_25_ARM64}/bin:$PATH
        export JAVA_HOME=${JAVA_HOME_25_ARM64}
        echo ${JAVA_HOME_25_ARM64}
        which java
        # echo "JAVA_HOME=${JAVA_HOME_25_ARM64}" >> $GITHUB_ENV
        # echo "${JAVA_HOME_25_ARM64}/bin" >> $GITHUB_PATH
    - name: Test versions
      shell: bash -el {0}
      run: |
        cat ${GITHUB_ENV}
        echo "======"
        java -version
        mvn -v
        uv --version
        python --version
        git --version
        echo "java home: ${JAVA_HOME}"
        echo "java_home_25_arm64: ${JAVA_HOME_25ARM64}"
        echo ${JAVA_CMD}
        which java
        echo "====="
        export PATH="${JAVA_HOME}/bin:$PATH"
        which java
    - name: Run pipeline tests
      shell: bash -el {0}
      run: |
        MKL_CBWR=AUTO uv run pytest tests/

    - name: Archive failed tests data
      uses: actions/upload-artifact@v7
      if: ${{ failure() }}
      with:
        name: tests-logs-${{ matrix.os }}-py${{ matrix.python-version }}
        path: |
          /tmp/pytest-of-runner/pytest-0
        retention-days: 1
